name: "GUI bug (Avalonia / WinForms)"
description: "A bug in the GUI application."
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "**One bug per issue.** Drag your screenshot straight onto the box below — do not link a Google Doc/Imgur. **Never attach your ROM (.gba).**"
  - type: markdown
    attributes:
      value: "This form is for **bugs**. New **features** go to [Ideas Discussions](https://github.com/laqieer/FEBuilderGBA/discussions/categories/ideas), not here — and the **WinForms GUI is stable (bug fixes only)**, so new GUI features ship to the **Avalonia GUI**. See the [GUI Strategy](https://github.com/laqieer/FEBuilderGBA/blob/master/docs/GUI-STRATEGY.md)."
  - type: dropdown
    id: app
    attributes:
      label: App
      options:
        - "Avalonia GUI (cross-platform)"
        - "WinForms GUI (Windows)"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - "Windows x64"
        - "Windows x86 (WinForms)"
        - "Linux x64"
        - "macOS Apple Silicon (arm64)"
        - "macOS Intel (x64)"
        - "Android"
        - "Other"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: "Help → About, or Tools → Version Information — the ver_YYYYMMDD.HH string."
    validations:
      required: true
  - type: dropdown
    id: rom
    attributes:
      label: ROM version
      description: "Shown in the bottom status bar, e.g. FE8U."
      options:
        - "FE6 (JP)"
        - "FE7 (JP)"
        - "FE7 (US)"
        - "FE8 (JP)"
        - "FE8 (US)"
        - "Other / not sure"
    validations:
      required: false
  - type: input
    id: editor
    attributes:
      label: Editor / screen
      description: "The window title, e.g. Class Editor."
    validations:
      required: false
  - type: textarea
    id: whatswrong
    attributes:
      label: What's wrong? (expected vs actual)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot(s)
      description: "Drag-and-drop the image(s) here (don't link an external Doc). Circle/arrow the broken area if you can."
    validations:
      required: true
  - type: textarea
    id: report7z
    attributes:
      label: report.7z (optional)
      description: "File → Problem Report Tool makes it (version + CRC32, NO ROM). Drag it here."
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I attached a screenshot (for visual bugs)
          required: false
        - label: I did NOT attach my ROM (.gba)
          required: true
