name: "E2E: FE8U"

on:
  schedule:
    - cron: '33 22 * * *'  # Daily UTC 22:33 (Beijing 06:33)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE8U
      job-name: "E2E FE8U"
      timeout: 30
      caller-event: ${{ github.event_name }}
    secrets: inherit
