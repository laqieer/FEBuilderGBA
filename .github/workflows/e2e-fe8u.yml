name: "E2E: FE8U"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '30 22 * * *'  # Daily UTC 22:30 (Beijing 06:30)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE8U
      job-name: "E2E FE8U"
      timeout: 30
    secrets: inherit
