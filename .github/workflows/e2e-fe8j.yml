name: "E2E: FE8J"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 22 * * *'   # Daily UTC 22:00 (Beijing 06:00)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE8J
      job-name: "E2E FE8J"
      timeout: 30
    secrets: inherit
