# Advisory Android Emulator Parity workflow (#1125) — the on-device byte-parity
# proof that closes #1125 and completes the #1070 epic checklist item 5.
#
# PURPOSE
# -------
# This workflow runs the SAME SkiaRenderByteParityTests and
# SkiaSharpVersionGuardTests that pass on the desktop (Linux/macOS/Windows) in
# the Core.Tests suite, but ON AN ANDROID EMULATOR, to prove that the pinned
# libSkiaSharp 2.88.9 Android native renders the GBA 4bpp-tile decode and PNG
# round-trip byte-identically, and the Tuffy glyph within the shared pixel
# tolerance, on the CI-bootable Android ABIs.
#
# ABI COVERAGE
# ------------
# x86_64 and x86 are the GitHub-hosted-runner-bootable ABIs. arm64-v8a and
# armeabi-v7a ship in the same pinned SkiaSharp.NativeAssets.Android 2.88.9
# package (the same .so files), but Android arm64/arm AVDs are NOT bootable on
# GitHub-hosted (x86_64) runners without KVM — they would require either a
# self-hosted ARM runner or a paid ARM-emulator service. This workflow provides
# on-device parity proof for x86_64 + x86; the other two ABIs are covered by
# the same-native-package argument (same 2.88.9 .so) and are honestly noted as
# not runner-bootable here.
#
# ADVISORY / NON-BLOCKING by construction
# ----------------------------------------
# * Separate workflow file — NOT part of check.yml.
# * Job/check context name: `android-emulator-parity` (NOT `build`, NOT
#   `android-build`) — can never collide with the required build contexts.
# * A slow emulator boot, a flaky KVM run, or a test failure shows as a
#   non-blocking red check on the PR, not a PR-merge gate.
# * Once stable, a maintainer can flip it to required via a branch-ruleset
#   change — no code change needed.
#
# DESIGN DECISIONS
# ----------------
# * KVM acceleration is enabled via the standard udev rule (required for any
#   useful emulator performance on ubuntu-latest).
# * AVD snapshots are cached per arch to speed up repeated runs.
# * The test APK does NOT reference FEBuilderGBA.Avalonia (no Avalonia startup
#   needed for pure SkiaSharp render tests), so no -p:EnableAndroidTarget flag.
# * Instruments via TestInstrumentation (com.laqieer.febuildergba.tests), which
#   delegates to the XHarness DefaultAndroidEntryPoint, writes TestResults.xml,
#   and returns a non-zero code on failure.
# * adb install + am instrument are retried once on transient failure.
# * CI fails the step (exit 1) if instrument output contains a failure marker
#   OR if TestResults.xml reports failures/errors > 0, OR if the XML is absent.

name: Android Emulator Parity

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-emulator-parity:
    name: Android Emulator Parity (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build-required submodules
        # Same submodule set as android.yml / check.yml. config/patch2 must
        # resolve (globbed as AndroidAsset in the main Android head; the test
        # head does not bundle it, but the submodule dir must exist for sibling
        # project restore). tool submodules are referenced transitively.
        run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-android-tests-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('FEBuilderGBA.Android.Tests/**/*.csproj', 'FEBuilderGBA.Android.Tests/nuget.config', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-android-tests-${{ runner.os }}-${{ matrix.arch }}-
            nuget-android-tests-${{ runner.os }}-

      - name: Install android workload
        run: dotnet workload install android

      - name: Enable KVM
        # Required for usable emulator performance on ubuntu-latest GitHub runners.
        # Without KVM the emulator runs in software-only mode and boots extremely
        # slowly (often timing out before the first adb command succeeds).
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build test APK
        # No -p:EnableAndroidTarget needed — the test project only references
        # FEBuilderGBA.Core and FEBuilderGBA.SkiaSharp, both plain net9.0.
        run: dotnet build FEBuilderGBA.Android.Tests/FEBuilderGBA.Android.Tests.csproj -c Release

      - name: Cache AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-${{ matrix.arch }}-v1

      - name: Create AVD (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD snapshot created for ${{ matrix.arch }}"

      - name: Run parity tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            set -euo pipefail

            ARCH="${{ matrix.arch }}"
            echo "=== Android Emulator Parity: arch=${ARCH} ==="

            # Locate the signed APK
            APK_PATH=$(find FEBuilderGBA.Android.Tests/bin/Release/net9.0-android -name "*-Signed.apk" | head -1)
            if [ -z "$APK_PATH" ]; then
              echo "ERROR: No *-Signed.apk found under FEBuilderGBA.Android.Tests/bin/Release/net9.0-android/"
              ls -la FEBuilderGBA.Android.Tests/bin/Release/net9.0-android/ || true
              exit 1
            fi
            echo "APK: $APK_PATH"

            # Install APK with one retry on transient adb failure
            install_apk() {
              adb install -r "$APK_PATH"
            }
            if ! install_apk; then
              echo "adb install failed, retrying in 10 seconds..."
              sleep 10
              install_apk
            fi

            # Run the instrumented tests via `am instrument`.
            # -e results-file-path: where the XHarness DefaultAndroidEntryPoint
            #   writes TestResults.xml (on the device, readable via adb pull).
            # -w: wait for instrumentation to finish (required for result collection).
            RESULTS_DEVICE_PATH="/sdcard/Download"
            INSTRUMENT_CMD="adb shell am instrument -w -e results-file-path ${RESULTS_DEVICE_PATH} com.laqieer.febuildergba.tests/com.laqieer.febuildergba.tests.TestInstrumentation"
            OUTFILE="instrument-out-${ARCH}.txt"

            run_instrument() {
              eval "$INSTRUMENT_CMD 2>&1 | tee $OUTFILE"
            }
            if ! run_instrument; then
              echo "am instrument failed, retrying in 15 seconds..."
              sleep 15
              run_instrument
            fi

            echo ""
            echo "=== instrument output ==="
            cat "$OUTFILE"
            echo ""

            # Pull TestResults.xml from the device
            XML_LOCAL="TestResults-${ARCH}.xml"
            if ! adb pull "${RESULTS_DEVICE_PATH}/TestResults.xml" "$XML_LOCAL"; then
              echo "WARNING: could not pull TestResults.xml — the test run may not have written it."
              XML_LOCAL=""
            fi

            # Pull logcat for diagnostics
            adb logcat -d > "logcat-${ARCH}.txt" || true

            # ---------------------------------------------------------------
            # PARSE RESULTS — fail the step if any test failed
            # ---------------------------------------------------------------
            FAILED=0

            # (a) am instrument output: look for the `FAILURES!!!` marker that
            #     am instrument prints when tests fail, or for an abnormal
            #     INSTRUMENTATION_RESULT code=failure.
            if grep -q "FAILURES!!!" "$OUTFILE" 2>/dev/null; then
              echo "FAIL: instrument output contains FAILURES!!!"
              FAILED=1
            fi
            if grep -q "INSTRUMENTATION_ABORTED" "$OUTFILE" 2>/dev/null; then
              echo "FAIL: INSTRUMENTATION_ABORTED in output"
              FAILED=1
            fi

            # (b) TestResults.xml: parse failures= and errors= attributes on
            #     the <assembly ...> element using grep (no xmllint dependency).
            if [ -n "$XML_LOCAL" ] && [ -f "$XML_LOCAL" ]; then
              XML_FAILURES=$(grep -oP 'failures="\K[^"]+' "$XML_LOCAL" | head -1 || echo "0")
              XML_ERRORS=$(grep -oP 'errors="\K[^"]+' "$XML_LOCAL" | head -1 || echo "0")
              XML_TOTAL=$(grep -oP 'total="\K[^"]+' "$XML_LOCAL" | head -1 || echo "0")
              XML_PASSED=$(grep -oP 'passed="\K[^"]+' "$XML_LOCAL" | head -1 || echo "0")
              echo "TestResults.xml: total=${XML_TOTAL} passed=${XML_PASSED} failures=${XML_FAILURES} errors=${XML_ERRORS}"
              if [ "${XML_FAILURES:-0}" != "0" ] || [ "${XML_ERRORS:-0}" != "0" ]; then
                echo "FAIL: TestResults.xml reports failures=${XML_FAILURES} errors=${XML_ERRORS}"
                FAILED=1
              fi
            else
              echo "WARNING: TestResults.xml not available; relying on instrument output only."
              # If no XML and no explicit FAILURES marker, check for OK marker.
              if ! grep -q "INSTRUMENTATION_STATUS_CODE: 0\|OK (" "$OUTFILE" 2>/dev/null; then
                echo "FAIL: instrument output has no OK marker and no TestResults.xml."
                FAILED=1
              fi
            fi

            if [ "$FAILED" = "0" ]; then
              echo ""
              echo "=== PASS: Android Emulator Parity (arch=${ARCH}) ==="
            else
              echo ""
              echo "=== FAIL: Android Emulator Parity (arch=${ARCH}) ==="
              exit 1
            fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-parity-${{ matrix.arch }}
          path: |
            instrument-out-${{ matrix.arch }}.txt
            TestResults-${{ matrix.arch }}.xml
            logcat-${{ matrix.arch }}.txt
          if-no-files-found: warn
