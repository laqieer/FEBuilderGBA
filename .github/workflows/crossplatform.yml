name: Cross-Platform Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init build-required submodules
      run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build ColorzCore (bundled EA tool)
      run: dotnet build tools/ColorzCore/ColorzCore/ColorzCore.csproj -c Release

    - name: Build Core library
      run: dotnet build FEBuilderGBA.Core/FEBuilderGBA.Core.csproj -c Release

    - name: Build CLI
      run: dotnet build FEBuilderGBA.CLI/FEBuilderGBA.CLI.csproj -c Release

    - name: Build SkiaSharp backend
      run: dotnet build FEBuilderGBA.SkiaSharp/FEBuilderGBA.SkiaSharp.csproj -c Release

    - name: Build Avalonia project
      run: dotnet build FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c Release

    - name: Run Core tests
      run: dotnet test FEBuilderGBA.Core.Tests/FEBuilderGBA.Core.Tests.csproj -c Release --logger "trx;LogFileName=core-tests.trx"

    - name: Run Avalonia tests (data-verify headless validation)
      run: dotnet test FEBuilderGBA.Avalonia.Tests/FEBuilderGBA.Avalonia.Tests.csproj -c Release --logger "trx;LogFileName=avalonia-tests.trx"

    - name: CLI smoke test
      run: dotnet run --project FEBuilderGBA.CLI/FEBuilderGBA.CLI.csproj -- --version

    - name: CLI help test
      run: dotnet run --project FEBuilderGBA.CLI/FEBuilderGBA.CLI.csproj -- --help

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/core-tests.trx
          **/avalonia-tests.trx
        if-no-files-found: ignore

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init build-required submodules
      run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publish ColorzCore (self-contained per-RID)
      run: dotnet publish tools/ColorzCore/ColorzCore/ColorzCore.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/tools-${{ matrix.rid }}

    - name: Publish CLI
      run: dotnet publish FEBuilderGBA.CLI/FEBuilderGBA.CLI.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/cli-${{ matrix.rid }}

    - name: Publish Avalonia
      run: dotnet publish FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/avalonia-${{ matrix.rid }}

    - name: Bundle ColorzCore into CLI and Avalonia artifacts
      shell: bash
      run: |
        for target in cli avalonia; do
          mkdir -p "publish/${target}-${{ matrix.rid }}/tools/bin"
          cp -r publish/tools-${{ matrix.rid }}/* "publish/${target}-${{ matrix.rid }}/tools/bin/"
        done
        # Copy lyn.exe if present in submodule
        if [ -f "tools/Event-Assembler/Event Assembler/Tools/lyn.exe" ]; then
          for target in cli avalonia; do
            mkdir -p "publish/${target}-${{ matrix.rid }}/tools/bin/Tools"
            cp "tools/Event-Assembler/Event Assembler/Tools/lyn.exe" "publish/${target}-${{ matrix.rid }}/tools/bin/Tools/lyn.exe"
          done
        fi

    - name: Bundle LICENSE and third-party notices into CLI and Avalonia artifacts
      shell: bash
      # GPLv3 requires the license text to accompany every binary distribution,
      # and the bundled ColorzCore / lyn.exe are themselves GPLv3. Ship LICENSE +
      # THIRD-PARTY-NOTICES.md inside each artifact (GPLv3 compliance, issue #1633).
      run: |
        for target in cli avalonia; do
          cp LICENSE "publish/${target}-${{ matrix.rid }}/LICENSE"
          cp THIRD-PARTY-NOTICES.md "publish/${target}-${{ matrix.rid }}/THIRD-PARTY-NOTICES.md"
        done

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: cli-${{ matrix.rid }}
        path: publish/cli-${{ matrix.rid }}

    - name: Upload Avalonia artifact
      uses: actions/upload-artifact@v4
      with:
        name: avalonia-${{ matrix.rid }}
        path: publish/avalonia-${{ matrix.rid }}
