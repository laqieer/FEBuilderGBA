name: E2E Reusable

on:
  workflow_call:
    inputs:
      rom-name:
        description: "ROM to test: FE6, FE7J, FE7U, FE8J, FE8U, or none"
        required: true
        type: string
      job-name:
        description: "Display name for the job"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes for the test step"
        required: false
        type: number
        default: 20
      caller-event:
        description: "The caller workflow's github.event_name (e.g. schedule, push, pull_request)"
        required: false
        type: string
        default: ""
    secrets:
      ROMS_URL:
        required: false

permissions:
  contents: read
  checks: write
  issues: write   # needed for auto-creating issues on scheduled failures

jobs:
  e2e:
    name: ${{ inputs.job-name }}
    runs-on: windows-latest
    timeout-minutes: 50
    env:
      HAVE_ROMS: ${{ secrets.ROMS_URL != '' }}

    steps:
      # ---------------------------------------------------------------- checkout
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Init build-required submodules
        run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore resources/fe-info

      # ---------------------------------------------------------------- Build bundled tools
      - name: Build ColorzCore (bundled EA tool)
        run: dotnet build tools/ColorzCore/ColorzCore/ColorzCore.csproj -c Release

      # ---------------------------------------------------------------- x86 .NET 10 runtimes
      - name: Ensure x86 .NET 10 runtimes
        # The x86 testhost needs both the base and WindowsDesktop runtimes. Hosted
        # images normally include them, but install only whichever family is absent.
        shell: pwsh
        run: |
          $root = "C:\Program Files (x86)\dotnet"
          $dotnet = Join-Path $root "dotnet.exe"
          $runtimes = if (Test-Path $dotnet) { @(& $dotnet --list-runtimes) } else { @() }
          $needBase = -not ($runtimes -match '^Microsoft\.NETCore\.App 10\.')
          $needDesktop = -not ($runtimes -match '^Microsoft\.WindowsDesktop\.App 10\.')
          if ($needBase -or $needDesktop) {
            $installer = "$env:RUNNER_TEMP/dotnet-install.ps1"
            Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile $installer
            if ($needBase) {
              & $installer -Architecture x86 -Runtime dotnet -Channel 10.0 -InstallDir $root
            }
            if ($needDesktop) {
              & $installer -Architecture x86 -Runtime windowsdesktop -Channel 10.0 -InstallDir $root
            }
          }
          $runtimes = @(& $dotnet --list-runtimes)
          if (-not ($runtimes -match '^Microsoft\.NETCore\.App 10\.') -or
              -not ($runtimes -match '^Microsoft\.WindowsDesktop\.App 10\.')) {
            throw "Required x86 .NET 10 runtime families are unavailable."
          }
          $runtimes
          # setup-dotnet exposes the x64 root as DOTNET_ROOT. Persist the verified
          # x86 root so native x86 apphosts do not try to load the x64 hostfxr.
          "DOTNET_ROOT(x86)=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DOTNET_ROOT_X86=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ---------------------------------------------------------------- Build main app + E2E tests
      - name: Restore & Build (Release x86)
        run: |
          dotnet msbuild FEBuilderGBA.sln `
            /p:Configuration=Release /p:Platform=x86 `
            /t:restore,build `
            /m

      # ---------------------------------------------------------------- Download ROMs (skip for 'none')
      - name: Download ROMs
        if: inputs.rom-name != 'none' && env.HAVE_ROMS == 'true'
        env:
          ROMS_URL: ${{ secrets.ROMS_URL }}
        shell: pwsh
        run: |
          $zip = "$env:TEMP\roms.zip"

          $maxAttempts = 3
          $backoffSeconds = @(0, 10, 30)  # no wait before attempt 1, 10s after fail 1, 30s after fail 2
          $success = $false

          Add-Type -AssemblyName System.IO.Compression.FileSystem

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host ""
            Write-Host "========== Attempt $attempt of $maxAttempts =========="

            # ---- Clean up stale artifacts from previous attempt ----------------
            if ($attempt -gt 1) {
              Write-Host "Cleaning up stale artifacts..."
              if (Test-Path $zip) {
                Remove-Item $zip -Force -ErrorAction Stop
                Write-Host "  Removed stale $zip"
              }
              $romsCleanDir = "${{ github.workspace }}\roms"
              if (Test-Path $romsCleanDir) {
                Remove-Item $romsCleanDir -Recurse -Force -ErrorAction Stop
                Write-Host "  Removed stale $romsCleanDir"
              }
            }

            # ---- Download ------------------------------------------------------
            Write-Host "Downloading roms.zip..."
            try {
              Invoke-WebRequest -Uri $env:ROMS_URL -OutFile $zip -ErrorAction Stop
            } catch {
              Write-Host "##[warning]Attempt $attempt : ROM download failed (network/HTTP error): $($_.Exception.Message)"
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }
            $zipSize = (Get-Item $zip).Length
            Write-Host "Downloaded $zipSize bytes."

            # ---- Validate zip header -------------------------------------------
            if ($zipSize -lt 4) {
              Write-Host "##[warning]Attempt $attempt : Downloaded file is too small ($zipSize bytes) to be a valid zip."
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }
            $header = [System.IO.File]::ReadAllBytes($zip)[0..3]
            if ($header[0] -ne 0x50 -or $header[1] -ne 0x4B) {
              Write-Host "##[warning]Attempt $attempt : Downloaded file is not a valid zip archive."
              Write-Host "  Magic bytes: $([BitConverter]::ToString($header))  (expected 50-4B-03-04)"
              Write-Host "  File size : $zipSize bytes"
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }

            # ---- List zip contents ---------------------------------------------
            Write-Host ""
            Write-Host "=== Zip contents ==="
            $zipCorrupt = $false
            $za = $null
            try {
              $za = [System.IO.Compression.ZipFile]::OpenRead($zip)
              foreach ($entry in $za.Entries) {
                Write-Host ("  {0,-20}  {1,12:N0} bytes" -f $entry.FullName, $entry.Length)
              }
            } catch {
              Write-Host "##[warning]Attempt $attempt : Zip is corrupt: $($_.Exception.Message)"
              $zipCorrupt = $true
            } finally {
              if ($null -ne $za) {
                $za.Dispose()
              }
            }
            if ($zipCorrupt) {
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }

            # ---- Extract -------------------------------------------------------
            Write-Host ""
            Write-Host "Extracting roms.zip..."
            $extractFailed = $false
            try {
              Expand-Archive -Path $zip -DestinationPath "${{ github.workspace }}" -Force -ErrorAction Stop
            } catch {
              Write-Host "##[warning]Attempt $attempt : Failed to extract roms.zip: $($_.Exception.Message)"
              $extractFailed = $true
            }
            if ($extractFailed) {
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }

            # ---- Verify target ROM ---------------------------------------------
            $romsDir = "${{ github.workspace }}\roms"
            $target  = "${{ inputs.rom-name }}.gba"
            $path    = Join-Path $romsDir $target
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              Write-Host "  [OK] $target  ($size bytes)"
              $success = $true
              break
            } else {
              Write-Host "##[warning]Attempt $attempt : Target ROM $target not found after extraction."
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $($backoffSeconds[$attempt]) seconds..."
                Start-Sleep -Seconds $backoffSeconds[$attempt]
              }
              continue
            }
          }

          if (-not $success) {
            Write-Host ""
            Write-Host "##[error]ROM download failed after $maxAttempts attempts. All failure modes exhausted."
            Write-Host "Update the ROMS_URL secret and re-run to enable ROM-based tests."
            exit 1
          }

      # ---------------------------------------------------------------- Filter ROMs (keep only target)
      - name: Filter ROMs (keep only ${{ inputs.rom-name }})
        if: inputs.rom-name != 'none' && env.HAVE_ROMS == 'true'
        shell: pwsh
        run: |
          $romsDir = "${{ github.workspace }}\roms"
          if (-not (Test-Path $romsDir)) {
            Write-Host "No roms directory — nothing to filter."
            exit 0
          }
          $keep = "${{ inputs.rom-name }}.gba"
          Get-ChildItem $romsDir -File | Where-Object { $_.Name -ne $keep } | ForEach-Object {
            Write-Host "Removing $($_.Name)"
            Remove-Item $_.FullName -Force
          }
          Write-Host ""
          Write-Host "=== Remaining ROMs ==="
          Get-ChildItem $romsDir -File | ForEach-Object { Write-Host "  $($_.Name)" }

      # ---------------------------------------------------------------- Build Avalonia
      - name: Build Avalonia (for screenshot tests)
        run: dotnet build FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c Release

      # ---------------------------------------------------------------- Diagnostic probe
      - name: Diagnostic - probe app startup
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "ERROR: exe not found at $exe"
            exit 1
          }
          Write-Host "Exe size: $((Get-Item $exe).Length) bytes"
          Write-Host "Config dir exists: $(Test-Path (Split-Path $exe -Parent | Join-Path -ChildPath 'config'))"

          Write-Host ""
          Write-Host "=== .NET runtime info ==="
          dotnet --list-runtimes

          Write-Host ""
          Write-Host "=== --version test (headless) ==="
          $verOut = "$env:TEMP\febuildergba-ver.txt"
          $p = Start-Process $exe -ArgumentList "--version" `
               -NoNewWindow -Wait -PassThru `
               -RedirectStandardOutput $verOut `
               -RedirectStandardError "$env:TEMP\febuildergba-ver-err.txt"
          Write-Host "Exit code: $($p.ExitCode)"
          if (Test-Path $verOut) {
            Write-Host "Stdout: $(Get-Content $verOut -Raw -ErrorAction SilentlyContinue)"
          }

          Write-Host ""
          Write-Host "=== GUI startup probe (10s) ==="
          $p2 = Start-Process $exe -PassThru
          for ($i = 0; $i -lt 10; $i++) {
            Start-Sleep 1
            $p2.Refresh()
            if ($p2.HasExited) {
              Write-Host "App exited at ${i}s with code $($p2.ExitCode)"
              break
            }
            Write-Host "[${i}s] still running — MainWindowTitle='$($p2.MainWindowTitle)'"
          }
          if (-not $p2.HasExited) {
            Write-Host "App running after 10s — killing"
            try { $p2.Kill() } catch {}
          }

      # ---------------------------------------------------------------- Capture WinForms screenshots
      - name: Capture WinForms screenshots
        if: inputs.rom-name != 'none' && env.HAVE_ROMS == 'true'
        continue-on-error: true
        shell: pwsh
        timeout-minutes: 10
        run: |
          $exe = "${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe"
          $romPath = "${{ github.workspace }}\roms\${{ inputs.rom-name }}.gba"
          $dir = "${{ github.workspace }}\e2e-screenshots"
          if (-not (Test-Path $romPath)) {
            Write-Host "ROM not found at $romPath — skipping WinForms screenshots"
            exit 0
          }
          Write-Host "Capturing WinForms screenshots for ${{ inputs.rom-name }}..."
          $out = "$env:TEMP\winforms-screenshot-stdout.txt"
          $err = "$env:TEMP\winforms-screenshot-stderr.txt"
          $p = Start-Process $exe `
            -ArgumentList "--rom `"$romPath`" --screenshot-all --screenshot-dir=`"$dir`"" `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput $out `
            -RedirectStandardError $err
          if (Test-Path $out) { Get-Content $out }
          if (Test-Path $err) { Get-Content $err }
          Write-Host "WinForms screenshot exit code: $($p.ExitCode)"
          $pngs = (Get-ChildItem "$dir\WinForms_*.png" -ErrorAction SilentlyContinue).Count
          Write-Host "WinForms screenshots captured: $pngs"

      # ---------------------------------------------------------------- Run E2E tests
      - name: Run E2E tests
        timeout-minutes: ${{ inputs.timeout }}
        env:
          FEBUILDERGBA_EXE: ${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe
          FEBUILDERGBA_CLI_EXE: ${{ github.workspace }}\FEBuilderGBA.CLI\bin\Release\net10.0\FEBuilderGBA.CLI.exe
          AVALONIA_EXE: ${{ github.workspace }}\FEBuilderGBA.Avalonia\bin\Release\net10.0\FEBuilderGBA.Avalonia.exe
          FEBUILDERGBA_CLI_LOG_DIR: ${{ github.workspace }}\cli-logs
          FEBUILDERGBA_SCREENSHOT_DIR: ${{ github.workspace }}\e2e-screenshots
          ROMS_DIR: ${{ inputs.rom-name == 'none' && '__no_roms__' || format('{0}\roms', github.workspace) }}
        run: |
          dotnet test FEBuilderGBA.E2ETests/FEBuilderGBA.E2ETests.csproj `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --logger "trx;LogFileName=e2e-results.trx"

      # ---------------------------------------------------------------- Publish test results
      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always() && hashFiles('FEBuilderGBA.E2ETests/TestResults/*.trx') != ''
        with:
          name: "E2E Results (${{ inputs.rom-name }})"
          path: "FEBuilderGBA.E2ETests/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      # ---------------------------------------------------------------- Upload artifacts
      - name: Upload E2E test report (TRX)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report-${{ inputs.rom-name }}
          path: "FEBuilderGBA.E2ETests/TestResults/*.trx"
          if-no-files-found: ignore

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots-${{ inputs.rom-name }}
          path: ${{ github.workspace }}\e2e-screenshots\
          if-no-files-found: ignore

      - name: Upload CLI output logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-output-logs-${{ inputs.rom-name }}
          path: ${{ github.workspace }}\cli-logs\
          if-no-files-found: ignore

      # ---------------------------------------------------------------- Create issue on scheduled failure
      - name: Create issue on scheduled E2E failure
        if: failure() && inputs.caller-event == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ROM_NAME="${{ inputs.rom-name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE=$(date -u +%Y-%m-%d)
          TITLE="E2E failure: ${ROM_NAME} (${DATE})"

          # Per-variant duplicate check: skip if an open issue already exists for this ROM
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "e2e-failure" --state open --search "E2E failure: ${ROM_NAME}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open issue #${EXISTING} already exists for ${ROM_NAME} — skipping."
            exit 0
          fi

          BODY="## Scheduled E2E failure: ${ROM_NAME}"
          BODY="${BODY}\n\nThe daily scheduled E2E test for **${ROM_NAME}** failed."
          BODY="${BODY}\n\n- **Run:** ${RUN_URL}"
          BODY="${BODY}\n- **Date:** ${DATE}"
          BODY="${BODY}\n- **Branch:** ${{ github.ref_name }}"
          BODY="${BODY}\n\nPlease investigate and fix the failing tests."

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --label "e2e-failure" \
            --body "$(printf '%b' "${BODY}")"
