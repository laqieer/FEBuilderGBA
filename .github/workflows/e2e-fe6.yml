name: "E2E: FE6"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '33 20 * * *'  # Daily UTC 20:33 (Beijing 04:33)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE6
      job-name: "E2E FE6"
      timeout: 30
      caller-event: ${{ github.event_name }}
    secrets: inherit
