name: "E2E: FE7J"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 21 * * *'   # Daily UTC 21:00 (Beijing 05:00)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE7J
      job-name: "E2E FE7J"
      timeout: 30
    secrets: inherit
