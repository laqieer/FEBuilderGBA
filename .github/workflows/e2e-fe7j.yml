name: "E2E: FE7J"

on:
  schedule:
    - cron: '3 21 * * *'   # Daily UTC 21:03 (Beijing 05:03)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE7J
      job-name: "E2E FE7J"
      timeout: 30
      caller-event: ${{ github.event_name }}
    secrets: inherit
