name: E2E Tests

# Run E2E tests separately from the main build pipeline so long-running
# GUI automation doesn't block normal CI.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: read
  checks: write            # required by dorny/test-reporter to post check-runs

jobs:
  e2e:
    name: E2E Automation
    runs-on: windows-latest     # Windows runner has a virtual display for WinForms GUI
    env:
      # Pre-compute a boolean flag from the secret so step `if:` conditions can
      # test it.  The `secrets` context is NOT accessible directly in `if:`
      # expressions — only job/step `env:` and a handful of other contexts are.
      HAVE_ROMS: ${{ secrets.ROMS_URL != '' }}

    steps:
      # ---------------------------------------------------------------- checkout
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------------------------------------------------------------- MSBuild
      # NOTE: setup-dotnet is intentionally omitted.  The windows-latest runner ships
      # with .NET 9 (x64 SDK + x86 runtime pre-installed).  Adding setup-dotnet@v4
      # overrides DOTNET_ROOT to an x64-only installation directory, which causes
      # FEBuilderGBA.exe (x86 WinExe) to fail with FrameworkNotFound (0x80008082).
      # The msbuild.yml workflow confirms the pre-installed dotnet is sufficient.
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.0.2

      # ---------------------------------------------------------------- Build main app + E2E tests
      # msbuild via .sln builds BOTH FEBuilderGBA and FEBuilderGBA.E2ETests.
      # Solution platform mapping:
      #   Release|x86 → FEBuilderGBA      : Release|Any CPU → bin\Release\
      #   Release|x86 → FEBuilderGBA.E2ETests: Release|Any CPU → bin\Release\net9.0-windows\
      - name: Restore & Build (Release x86)
        run: |
          msbuild FEBuilderGBA.sln `
            /p:Configuration=Release /p:Platform=x86 `
            /t:restore,build `
            /m

      # ---------------------------------------------------------------- Download ROMs (gated on ROMS_URL secret)
      # The secret ROMS_URL points to a roms.zip that extracts a roms/ directory
      # containing FE6.gba, FE7J.gba, FE7U.gba, FE8J.gba, FE8U.gba.
      # If the secret is absent (e.g. forks, PRs from external contributors) this
      # step is skipped and ROM-based tests auto-skip via Assert.Skip().
      # Soft-failure policy:
      #   - Network error (Invoke-WebRequest throws)  → hard fail (exit 1): URL is unreachable
      #   - Downloaded file is not a valid zip         → warning + exit 0: URL may be expired/redirected
      #   - Expand-Archive fails                       → warning + exit 0: treat as unavailable
      #   - ROMs extracted but wrong filenames         → warning + exit 0: skip affected tests
      # ROM tests auto-skip via Assert.Skip() whenever ROMS_DIR exists but a ROM is missing.
      - name: Download ROMs
        if: env.HAVE_ROMS == 'true'
        env:
          ROMS_URL: ${{ secrets.ROMS_URL }}
        shell: pwsh
        run: |
          $zip = "$env:TEMP\roms.zip"

          # ---- Download -------------------------------------------------------
          Write-Host "Downloading roms.zip..."
          try {
            Invoke-WebRequest -Uri $env:ROMS_URL -OutFile $zip -ErrorAction Stop
          } catch {
            Write-Host "##[error]ROM download failed (network/HTTP error): $($_.Exception.Message)"
            Write-Host "Update the ROMS_URL secret and re-run to enable ROM-based tests."
            exit 1
          }
          $zipSize = (Get-Item $zip).Length
          Write-Host "Downloaded $zipSize bytes."

          # ---- Validate zip: magic bytes then ZipFile::OpenRead() ---------------
          # Level 1: magic bytes — fast check; HTML/error pages fail immediately.
          $header = [System.IO.File]::ReadAllBytes($zip)[0..3]
          if ($header[0] -ne 0x50 -or $header[1] -ne 0x4B) {
            Write-Host "##[warning]Downloaded file is not a valid zip archive."
            Write-Host "  Magic bytes: $([BitConverter]::ToString($header))  (expected 50-4B-03-04)"
            Write-Host "  File size : $zipSize bytes"
            Write-Host "  ROMS_URL may have expired or redirected to an auth/error page."
            Write-Host "ROM-based tests will be skipped this run."
            exit 0
          }

          # Level 2: open as ZipArchive — detects truncated or structurally corrupt zips.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          Write-Host ""
          Write-Host "=== Zip contents ==="
          try {
            $za = [System.IO.Compression.ZipFile]::OpenRead($zip)
            foreach ($entry in $za.Entries) {
              Write-Host ("  {0,-20}  {1,12:N0} bytes" -f $entry.FullName, $entry.Length)
            }
            $entryCount = $za.Entries.Count
            $za.Dispose()
            Write-Host "  --- $entryCount entries total ---"
          } catch {
            Write-Host "##[warning]Zip magic bytes are valid but ZipFile::OpenRead failed: $($_.Exception.Message)"
            Write-Host "ROM-based tests will be skipped this run."
            exit 0
          }

          # ---- Extract --------------------------------------------------------
          Write-Host ""
          Write-Host "Extracting roms.zip..."
          try {
            Expand-Archive -Path $zip -DestinationPath "${{ github.workspace }}" -Force -ErrorAction Stop
          } catch {
            Write-Host "##[warning]Failed to extract roms.zip: $($_.Exception.Message)"
            Write-Host "ROM-based tests will be skipped this run."
            exit 0
          }

          # ---- Verify expected ROM files --------------------------------------
          $romsDir = "${{ github.workspace }}\roms"
          $expected = @("FE6.gba", "FE7J.gba", "FE7U.gba", "FE8J.gba", "FE8U.gba")
          $missing  = @()
          Write-Host ""
          Write-Host "=== ROM verification ==="
          foreach ($name in $expected) {
            $path = Join-Path $romsDir $name
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              Write-Host "  [OK] $name  ($size bytes)"
            } else {
              Write-Host "  [MISSING] $name"
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host ""
            Write-Host "##[warning]Missing ROMs after extraction: $($missing -join ', ')"
            Write-Host "These ROM tests will be skipped. Check the contents of roms.zip."
          } else {
            Write-Host ""
            Write-Host "All $($expected.Count) ROMs present — ROM-based tests will run."
          }

      # ---------------------------------------------------------------- Diagnostic: probe app startup before tests
      # Run with continue-on-error so CI doesn't fail on probe errors.
      # Output shows whether --version works and whether the GUI starts cleanly.
      - name: Diagnostic - probe app startup
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "ERROR: exe not found at $exe"
            exit 1
          }
          Write-Host "Exe size: $((Get-Item $exe).Length) bytes"
          Write-Host "Config dir exists: $(Test-Path (Split-Path $exe -Parent | Join-Path -ChildPath 'config'))"

          Write-Host ""
          Write-Host "=== .NET runtime info ==="
          dotnet --list-runtimes

          Write-Host ""
          Write-Host "=== --version test (headless) ==="
          $verOut = "$env:TEMP\febuildergba-ver.txt"
          $p = Start-Process $exe -ArgumentList "--version" `
               -NoNewWindow -Wait -PassThru `
               -RedirectStandardOutput $verOut `
               -RedirectStandardError "$env:TEMP\febuildergba-ver-err.txt"
          Write-Host "Exit code: $($p.ExitCode)"
          if (Test-Path $verOut) {
            Write-Host "Stdout: $(Get-Content $verOut -Raw -ErrorAction SilentlyContinue)"
          }

          Write-Host ""
          Write-Host "=== GUI startup probe (10s) ==="
          $p2 = Start-Process $exe -PassThru
          for ($i = 0; $i -lt 10; $i++) {
            Start-Sleep 1
            $p2.Refresh()
            if ($p2.HasExited) {
              Write-Host "App exited at ${i}s with code $($p2.ExitCode)"
              break
            }
            Write-Host "[${i}s] still running — MainWindowTitle='$($p2.MainWindowTitle)'"
          }
          if (-not $p2.HasExited) {
            Write-Host "App running after 10s — killing"
            try { $p2.Kill() } catch {}
          }

      # ---------------------------------------------------------------- Run E2E tests
      # --no-build: msbuild already built everything; dotnet test just runs the tests.
      # Uses TRX logger (same as msbuild.yml) — JunitXml.TestLogger v3.1.12 has a
      # known bug that returns exit code 1 even when all tests pass.
      - name: Run E2E tests
        env:
          # msbuild via .sln maps Release|x86 → Release|Any CPU → bin\Release\
          FEBUILDERGBA_EXE: ${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe
          FEBUILDERGBA_SCREENSHOT_DIR: ${{ github.workspace }}\e2e-screenshots
          ROMS_DIR: ${{ github.workspace }}\roms
        run: |
          dotnet test FEBuilderGBA.E2ETests/FEBuilderGBA.E2ETests.csproj `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --logger "trx;LogFileName=e2e-results.trx"
        # Note: xunit test collections run sequentially by default when each test
        # launches its own exclusive app process.

      # ---------------------------------------------------------------- Publish test results as check-run
      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        # Only run when a TRX file actually exists; dorny/test-reporter@v1 errors
        # out (even with fail-on-error: false) when the path glob matches no files.
        if: always() && hashFiles('FEBuilderGBA.E2ETests/TestResults/*.trx') != ''
        with:
          name: E2E Test Results
          path: "FEBuilderGBA.E2ETests/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      # ---------------------------------------------------------------- Upload artifacts
      - name: Upload E2E test report (TRX)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: "FEBuilderGBA.E2ETests/TestResults/*.trx"
          if-no-files-found: ignore

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: ${{ github.workspace }}\e2e-screenshots\
          if-no-files-found: ignore
