name: E2E Tests

# Run E2E tests separately from the main build pipeline so long-running
# GUI automation doesn't block normal CI.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:      # allow manual trigger

jobs:
  e2e:
    name: E2E Automation
    runs-on: windows-latest     # Windows runner has a virtual display for WinForms GUI

    steps:
      # ---------------------------------------------------------------- checkout
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------------------------------------------------------------- .NET SDK
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ---------------------------------------------------------------- MSBuild
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.0.2

      # ---------------------------------------------------------------- Build main app
      # Use msbuild with .sln so the platform mapping (Release|x86 → Release|Any CPU)
      # puts the output in bin\Release\ (same as the main msbuild.yml workflow).
      - name: Restore & Build FEBuilderGBA (Release x86)
        run: |
          msbuild FEBuilderGBA.sln `
            /p:Configuration=Release /p:Platform=x86 `
            /t:restore,build `
            /m

      # ---------------------------------------------------------------- Restore E2E project
      - name: Restore E2E test project
        run: dotnet restore FEBuilderGBA.E2ETests/FEBuilderGBA.E2ETests.csproj -p:Platform=x86

      # ---------------------------------------------------------------- Diagnostic: probe app startup before tests
      # Run with continue-on-error so CI doesn't fail on probe errors.
      # Output shows whether --version works and whether the GUI starts cleanly.
      - name: Diagnostic - probe app startup
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "ERROR: exe not found at $exe"
            exit 1
          }
          Write-Host "Exe size: $((Get-Item $exe).Length) bytes"
          Write-Host "Config dir exists: $(Test-Path (Split-Path $exe -Parent | Join-Path -ChildPath 'config'))"

          Write-Host ""
          Write-Host "=== --version test (headless) ==="
          $verOut = "$env:TEMP\febuildergba-ver.txt"
          $p = Start-Process $exe -ArgumentList "--version" `
               -NoNewWindow -Wait -PassThru `
               -RedirectStandardOutput $verOut `
               -RedirectStandardError "$env:TEMP\febuildergba-ver-err.txt"
          Write-Host "Exit code: $($p.ExitCode)"
          if (Test-Path $verOut) {
            Write-Host "Stdout: $(Get-Content $verOut -Raw -ErrorAction SilentlyContinue)"
          }

          Write-Host ""
          Write-Host "=== GUI startup probe (10s) ==="
          $p2 = Start-Process $exe -PassThru
          for ($i = 0; $i -lt 10; $i++) {
            Start-Sleep 1
            $p2.Refresh()
            if ($p2.HasExited) {
              Write-Host "App exited at ${i}s with code $($p2.ExitCode)"
              break
            }
            Write-Host "[${i}s] still running — MainWindowTitle='$($p2.MainWindowTitle)'"
          }
          if (-not $p2.HasExited) {
            Write-Host "App running after 10s — killing"
            try { $p2.Kill() } catch {}
          }

      # ---------------------------------------------------------------- Run E2E tests
      - name: Run E2E tests
        env:
          # msbuild via .sln maps Release|x86 → Release|Any CPU → bin\Release\
          FEBUILDERGBA_EXE: ${{ github.workspace }}\FEBuilderGBA\bin\Release\FEBuilderGBA.exe
          FEBUILDERGBA_SCREENSHOT_DIR: ${{ github.workspace }}\e2e-screenshots
        run: |
          dotnet test FEBuilderGBA.E2ETests/FEBuilderGBA.E2ETests.csproj `
            --configuration Release `
            -p:Platform=x86 `
            --logger "junit;LogFilePath=${{ github.workspace }}\e2e-results\e2e-results.xml" `
            --results-directory "${{ github.workspace }}\e2e-results" `
            --no-restore `
            -- xunit.parallelizeTestCollections=false
        # Note: parallelism disabled — GUI tests need to launch exclusive app processes

      # ---------------------------------------------------------------- Upload artifacts
      - name: Upload E2E test report (JUnit XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: ${{ github.workspace }}\e2e-results\*.xml

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: ${{ github.workspace }}\e2e-screenshots\
          if-no-files-found: ignore
