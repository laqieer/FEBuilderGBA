# Build the Avalonia WebAssembly head and deploy it to GitHub Pages (#1864).
#
# The FEBuilderGBA.Browser head (net9.0-browser) is INTENTIONALLY excluded from FEBuilderGBA.sln
# because the required desktop `build` check builds the whole solution on windows-latest with NO
# wasm-tools workload. This dedicated workflow builds the wasm AppBundle on a workload-capable
# ubuntu-latest runner and deploys it to GitHub Pages.
#
# - The `build` job runs on PRs too (so the wasm build is validated before merge) but does NOT
#   deploy. Its check is a separate context ("build") from the required desktop `build` check in
#   check.yml only by workflow name; it can't block PR merges (this workflow is not a required
#   status check).
# - The `deploy` job runs ONLY on push to master / manual dispatch (never from a PR).
#
# GitHub Pages must have its source set to "GitHub Actions" (build_type=workflow) — enabled once
# out-of-band (gh api) and re-asserted idempotently by actions/configure-pages below.

name: Deploy Web (WebAssembly) to GitHub Pages

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do NOT cancel an in-progress deploy (Pages deploys are atomic).
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_CONFIGURATION: Release
  # GitHub Pages project site is served under https://<owner>.github.io/<repo>/ — the app's
  # <base href> must match or every relative asset (config.zip, _framework/*) 404s.
  PAGES_BASE_PATH: /FEBuilderGBA/

jobs:
  build:
    name: Build wasm AppBundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # config/** are regular tracked files (present); patch2 is excluded from the bundle and
        # gated off the browser TFM, so NO submodule init is needed.

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Install wasm-tools workload
        # Provides the net9 wasm toolchain + Emscripten used to emcc-relink the SkiaSharp + HarfBuzz
        # native archives into dotnet.native.wasm (WasmBuildNative=true). BOTH ids are installed on
        # purpose: the hosted runner's default SDK is a 10.x band, so `wasm-tools` alone pulls the
        # 10.x ("current") toolchain and the net9 native build fails with NETSDK1147
        # ("wasm-tools-net9 must be installed"). `wasm-tools-net9` supplies net9's Emscripten 3.1.34,
        # which also matches SkiaSharp 2.88.9's prebuilt libSkiaSharp.a/3.1.34 (a newer emcc would
        # mismatch the archive). Clean NuGet-pack install on Linux (no MSI / elevation). (#1867)
        run: dotnet workload install wasm-tools wasm-tools-net9

      - name: Publish Browser head
        # EnableBrowserTarget=true as a GLOBAL property (restore static-graph / NETSDK1005 fix,
        # same as android/iOS). Threads OFF (Pages has no COOP/COEP), no trim (reflection-heavy
        # Core), no compression (Pages does no content-negotiation).
        run: |
          dotnet publish FEBuilderGBA.Browser/FEBuilderGBA.Browser.csproj \
            -c ${{ env.BUILD_CONFIGURATION }} \
            -p:EnableBrowserTarget=true \
            -p:WasmEnableThreads=false \
            -p:PublishTrimmed=false \
            -p:CompressionEnabled=false

      - name: Prepare Pages artifact (base href + .nojekyll + verify)
        run: |
          set -euo pipefail
          OUT="FEBuilderGBA.Browser/bin/${{ env.BUILD_CONFIGURATION }}/net9.0-browser/publish/wwwroot"
          if [ ! -d "$OUT" ]; then
            echo "::error::publish wwwroot not found at $OUT"
            echo "--- tree of bin/Release/net9.0-browser ---"
            find "FEBuilderGBA.Browser/bin/${{ env.BUILD_CONFIGURATION }}/net9.0-browser" -maxdepth 3 -type d | head -50
            exit 1
          fi
          # Rewrite the <base href> to the GitHub Pages project path.
          sed -i "s|<base href=\"/\" />|<base href=\"${{ env.PAGES_BASE_PATH }}\" />|" "$OUT/index.html"
          grep -q "<base href=\"${{ env.PAGES_BASE_PATH }}\"" "$OUT/index.html" \
            || { echo "::error::base href rewrite to ${{ env.PAGES_BASE_PATH }} failed"; grep -n '<base' "$OUT/index.html" || true; exit 1; }
          # .nojekyll so Pages' Jekyll doesn't strip the _framework/ dir (leading underscore).
          touch "$OUT/.nojekyll"
          # Verify the config.zip bundled AND retained the config/ prefix (not flattened) — the
          # app extracts + resolves {BaseDirectory}/config/config.xml from it.
          test -f "$OUT/config.zip" || { echo "::error::config.zip missing from AppBundle"; ls -la "$OUT"; exit 1; }
          if command -v unzip >/dev/null 2>&1; then
            unzip -l "$OUT/config.zip" | grep -q 'config/data/6c_name_FE8.txt' \
              || { echo "::error::config.zip missing config/ content (flattened or empty?)"; unzip -l "$OUT/config.zip" | head; exit 1; }
          fi
          echo "AppBundle OK ($OUT):"
          ls -la "$OUT" | head -40
          test -d "$OUT/_framework" || { echo "::error::_framework/ missing (wasm runtime not published?)"; exit 1; }
          # #1867: a proper native wasm build (WasmBuildNative=true) puts Avalonia's JS modules in
          # _framework/ (canonical, next to dotnet.js), where Avalonia's default resolver looks. Print
          # the actual location for diagnostics; fail only if avalonia.js is nowhere. The headless boot
          # smoke test below is the real arbiter of whether the app can actually load them.
          echo "--- Avalonia JS module locations (relative to \$OUT) ---"
          find "$OUT" -maxdepth 2 -type f \( -name 'avalonia.js' -o -name 'storage.js' -o -name 'dotnet.js' \) -printf '%P\n' | sort || true
          if [ -f "$OUT/_framework/avalonia.js" ]; then
            echo "avalonia.js -> _framework/ (canonical; Avalonia default resolver)"
          elif [ -f "$OUT/avalonia.js" ]; then
            echo "::warning::avalonia.js is at wwwroot ROOT, not _framework/ — the default resolver will 404 it; the boot smoke test will catch it (#1867)"
          else
            echo "::error::avalonia.js not found in _framework/ or at wwwroot root (Avalonia static web asset not published — see #1867)"; ls -la "$OUT"; exit 1
          fi

      - name: Set up Node.js (web boot smoke test)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Web boot smoke test (headless Chromium)
        # #1867 regression guard: a real browser boots the wasm app and asserts it RENDERS (Avalonia
        # canvas mounted) with no avalonia.js >= 400 — the class of failure HTTP-200 checks cannot
        # catch (that is exactly how #1867 shipped). Runs on PRs too (this build job runs on
        # pull_request), so a boot regression fails the PR; on push it gates deploy (deploy needs build).
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/FEBuilderGBA.Browser/bin/${{ env.BUILD_CONFIGURATION }}/net9.0-browser/publish/wwwroot"
          cd FEBuilderGBA.Browser/tests/smoke
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
          SMOKE_WWWROOT="$OUT" \
          SMOKE_BASE_PATH="${{ env.PAGES_BASE_PATH }}" \
          SMOKE_SCREENSHOT="$GITHUB_WORKSPACE/web-boot-smoke.png" \
          node smoke.mjs

      - name: Upload web boot screenshot
        # Always upload (even on smoke failure) so the rendered/blank screenshot is available as proof
        # / debugging evidence on the workflow run.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-boot-smoke
          path: web-boot-smoke.png
          if-no-files-found: warn

      - name: Configure Pages
        # Idempotent; asserts the Actions build type. enablement:true turns Pages on if it isn't.
        # Gated to non-PR: on a pull_request (esp. from a fork) the GITHUB_TOKEN is read-only, so
        # configuring/enabling Pages fails — the PR only needs to VALIDATE the wasm build above.
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        # Only upload on master/dispatch (the deploy job consumes it). Uploading the Pages artifact
        # also needs write scope not available to PRs from forks.
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: FEBuilderGBA.Browser/bin/${{ env.BUILD_CONFIGURATION }}/net9.0-browser/publish/wwwroot

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy from master / manual dispatch — never from a pull request.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
