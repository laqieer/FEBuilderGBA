name: "E2E: No ROM"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: none
      job-name: "E2E No ROM"
      timeout: 10
    secrets: inherit
