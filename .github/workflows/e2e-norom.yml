name: "E2E: No ROM"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 20 * * *'   # Daily UTC 20:00 (Beijing 04:00)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: none
      job-name: "E2E No ROM"
      timeout: 10
    secrets: inherit
