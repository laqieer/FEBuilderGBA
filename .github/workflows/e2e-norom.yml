name: "E2E: No ROM"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '3 20 * * *'   # Daily UTC 20:03 (Beijing 04:03)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: none
      job-name: "E2E No ROM"
      timeout: 10
      is-scheduled: ${{ github.event_name == 'schedule' }}
    secrets: inherit
