# Tag-triggered release workflow (#1629).
#
# WHAT IT DOES
#   On a pushed `ver_*` tag (the project's existing tag convention,
#   `ver_YYYYMMDD.HH` — see `git tag` / docs/DEPLOYMENT.md) this workflow builds
#   every shipping platform, then creates a single GitHub Release for that tag
#   and attaches every platform package as a zipped release asset:
#     * WinForms desktop package        (FEBuilderGBA_<tag>.zip)
#     * self-contained CLI bundles      (FEBuilderGBA-cli-<rid>.zip)
#     * self-contained Avalonia bundles (FEBuilderGBA-avalonia-<rid>.zip)
#     * Android APK                     (FEBuilderGBA-android-apk.zip)
#
#   Each build job mirrors the conventions of the existing workflow it is based
#   on so packaging stays consistent:
#     * `winforms`      -> msbuild.yml  ("Post Build" packaging step, verbatim)
#     * `crossplatform` -> crossplatform.yml (publish job, per-RID)
#     * `android`       -> android.yml  (workload build + *-Signed.apk)
#
# DRY RUN (AC4)
#   `workflow_dispatch` runs the build jobs only and does NOT create a release
#   (the release job's create step is gated on `refs/tags/ver_*`). Pushing a real
#   test `ver_*` tag exercises the full path and populates the release page with
#   every platform download.

name: Release

on:
  push:
    tags: [ 'ver_*' ]
  workflow_dispatch:

# Read-only by default; the release job opts up to contents: write locally.
permissions:
  contents: read

env:
  BUILD_CONFIGURATION: Release

jobs:
  # ---------------------------------------------------------------------------
  # WinForms desktop package (mirrors msbuild.yml: x86 build + "Post Build").
  # ---------------------------------------------------------------------------
  winforms:
    name: WinForms package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Init build-required submodules
        run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore resources/fe-info

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install x86 .NET 9 runtimes (windows-latest image dropped x86 9.0)
        # Same as msbuild.yml: the hosted image ships x86 8.0/10.0 but not 9.0.
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile "$env:RUNNER_TEMP/dotnet-install.ps1"
          & "$env:RUNNER_TEMP/dotnet-install.ps1" -Architecture x86 -Runtime dotnet         -Channel 9.0 -InstallDir "C:\Program Files (x86)\dotnet"
          & "$env:RUNNER_TEMP/dotnet-install.ps1" -Architecture x86 -Runtime windowsdesktop -Channel 9.0 -InstallDir "C:\Program Files (x86)\dotnet"

      - name: Publish ColorzCore (self-contained Windows x86)
        run: dotnet publish tools/ColorzCore/ColorzCore/ColorzCore.csproj -c ${{ env.BUILD_CONFIGURATION }} -r win-x86 --self-contained true -o tools/publish

      - name: Build
        run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x86 /t:build /restore /p:InformationalVersion=${{ github.ref_name }} .

      - name: Post Build (assemble desktop package)
        # Based on msbuild.yml's "Post Build" step: collect exe/dll/json + config
        # (patch2 stripped, empty version dirs kept), bundle ColorzCore + lyn.
        # NOTE: msbuild.yml's trailing build_time/README stamping lines are
        # intentionally omitted here (a release uses the tag for versioning).
        shell: pwsh
        run: |
          mv FEBuilderGBA/bin/Release/FEBuilderGBA.exe .
          mv FEBuilderGBA/bin/Release/*.dll .
          mv FEBuilderGBA/bin/Release/*.json .
          if (Test-Path "FEBuilderGBA/bin/Release/config") {
            if (Test-Path "config") {
              Remove-Item -Path "config" -Recurse -Force
            }
            mv FEBuilderGBA/bin/Release/config .
          }
          if (Test-Path "config/patch2") {
            Remove-Item "config/patch2" -Recurse -Force
          }
          $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE6"
          $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE7J"
          $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE7U"
          $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE8J"
          $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE8U"
          $colorzSrc = "tools/publish"
          if (Test-Path "$colorzSrc/ColorzCore.exe") {
            $null = New-Item -ItemType Directory -Force -Path "tools/bin"
            Copy-Item "$colorzSrc/*" "tools/bin/" -Recurse -Force
            Write-Host "Self-contained ColorzCore copied to tools/bin/"
          } else {
            Write-Host "##[error]ColorzCore publish output not found at tools/publish/"
            exit 1
          }
          $lynSrc = "tools/Event-Assembler/Event Assembler/Tools/lyn.exe"
          if (Test-Path $lynSrc) {
            $null = New-Item -ItemType Directory -Force -Path "tools/bin/Tools"
            Copy-Item $lynSrc "tools/bin/Tools/lyn.exe" -Force
            Write-Host "Bundled lyn.exe copied to tools/bin/Tools/"
          }

      - name: Zip desktop package
        shell: pwsh
        run: |
          $staging = "FEBuilderGBA_${{ github.ref_name }}"
          $null = New-Item -ItemType Directory -Force -Path $staging
          Copy-Item *.exe $staging -Force -ErrorAction SilentlyContinue
          Copy-Item *.dll $staging -Force -ErrorAction SilentlyContinue
          Copy-Item *.json $staging -Force -ErrorAction SilentlyContinue
          Copy-Item README*.md $staging -Force -ErrorAction SilentlyContinue
          Copy-Item config $staging -Recurse -Force
          Copy-Item tools/bin "$staging/tools/bin" -Recurse -Force
          Compress-Archive -Path "$staging/*" -DestinationPath "FEBuilderGBA_${{ github.ref_name }}.zip" -Force

      - name: Upload WinForms artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-winforms
          path: FEBuilderGBA_${{ github.ref_name }}.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Per-RID self-contained CLI + Avalonia bundles (mirrors crossplatform.yml).
  # ---------------------------------------------------------------------------
  crossplatform:
    name: CLI + Avalonia (${{ matrix.rid }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build-required submodules
        run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore resources/fe-info

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish ColorzCore (self-contained per-RID)
        run: dotnet publish tools/ColorzCore/ColorzCore/ColorzCore.csproj -c ${{ env.BUILD_CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -o publish/tools-${{ matrix.rid }}

      - name: Publish CLI
        run: dotnet publish FEBuilderGBA.CLI/FEBuilderGBA.CLI.csproj -c ${{ env.BUILD_CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -o publish/cli-${{ matrix.rid }} -p:InformationalVersion=${{ github.ref_name }} -p:IncludeSourceRevisionInInformationalVersion=false

      - name: Publish Avalonia
        run: dotnet publish FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c ${{ env.BUILD_CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -o publish/avalonia-${{ matrix.rid }} -p:InformationalVersion=${{ github.ref_name }} -p:IncludeSourceRevisionInInformationalVersion=false

      - name: Bundle ColorzCore into CLI and Avalonia artifacts
        shell: bash
        run: |
          for target in cli avalonia; do
            mkdir -p "publish/${target}-${{ matrix.rid }}/tools/bin"
            cp -r publish/tools-${{ matrix.rid }}/* "publish/${target}-${{ matrix.rid }}/tools/bin/"
          done
          if [ -f "tools/Event-Assembler/Event Assembler/Tools/lyn.exe" ]; then
            for target in cli avalonia; do
              mkdir -p "publish/${target}-${{ matrix.rid }}/tools/bin/Tools"
              cp "tools/Event-Assembler/Event Assembler/Tools/lyn.exe" "publish/${target}-${{ matrix.rid }}/tools/bin/Tools/lyn.exe"
            done
          fi

      - name: Zip CLI + Avalonia bundles
        # windows-latest has no `zip` on PATH (the previous bash `zip` here failed
        # the win-x64 leg with "zip: command not found", exit 127). Prefer Info-ZIP
        # `zip` where it exists (linux/macOS) because it preserves the executable
        # bit on the self-contained app hosts; fall back to PowerShell
        # Compress-Archive only where `zip` is unavailable (Windows, where unix
        # file permissions are irrelevant to the .exe bundle).
        shell: bash
        run: |
          for target in cli avalonia; do
            src="publish/${target}-${{ matrix.rid }}"
            out="$GITHUB_WORKSPACE/FEBuilderGBA-${target}-${{ matrix.rid }}.zip"
            if command -v zip >/dev/null 2>&1; then
              ( cd "$src" && zip -r "$out" . )
            else
              pwsh -NoProfile -Command "Compress-Archive -Path '$src/*' -DestinationPath '$out' -Force"
            fi
          done

      - name: Upload CLI + Avalonia artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-crossplatform-${{ matrix.rid }}
          path: |
            FEBuilderGBA-cli-${{ matrix.rid }}.zip
            FEBuilderGBA-avalonia-${{ matrix.rid }}.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android APK (mirrors android.yml). REQUIRED for the release: #1629 AC1/AC2
  # mandate the Android APK as one of the attached platform downloads, so the
  # release job gates on this job succeeding and verifies the APK zip is present
  # before publishing (no release missing a required platform asset).
  # ---------------------------------------------------------------------------
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build-required submodules
        run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore resources/fe-info

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install android workload
        run: dotnet workload install android

      - name: Build Android APK
        run: dotnet build FEBuilderGBA.Android/FEBuilderGBA.Android.csproj -c ${{ env.BUILD_CONFIGURATION }} -p:EnableAndroidTarget=true -p:InformationalVersion=${{ github.ref_name }} -p:IncludeSourceRevisionInInformationalVersion=false

      - name: Zip Android APK
        shell: bash
        run: |
          apk=$(ls FEBuilderGBA.Android/bin/Release/net9.0-android/*-Signed.apk | head -n 1)
          zip -j "$GITHUB_WORKSPACE/FEBuilderGBA-android-apk.zip" "$apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: FEBuilderGBA-android-apk.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS unsigned .ipa (mirrors ios.yml). SOFT / advisory for the release (#1859):
  # iOS is a PREVIEW and its macos-latest unsigned build is not yet proven stable,
  # so — unlike the REQUIRED android job — this job is continue-on-error and is NOT
  # in the release job's mandatory verify-assets list. The .ipa is attached when the
  # build succeeds; a failure degrades to "release without iOS" instead of blocking
  # WinForms/CLI/Avalonia/Android from publishing. Promote to required once the build
  # is proven stable (the same graduation path android.yml describes). The .ipa is
  # UNSIGNED (no Apple secret on this fork) — for downstream re-signing / sideload,
  # not directly installable. See docs/IOS.md.
  # ---------------------------------------------------------------------------
  ios:
    name: iOS IPA (advisory)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No submodule init needed (config/** are regular files; patch2 excluded from the
      # bundle) — see ios.yml.
      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install ios workload
        run: dotnet workload install ios

      - name: Build unsigned iOS .ipa
        run: |
          set -euo pipefail
          dotnet publish FEBuilderGBA.iOS/FEBuilderGBA.iOS.csproj \
            -c ${{ env.BUILD_CONFIGURATION }} \
            -p:EnableIosTarget=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:EnableCodeSigning=false \
            -p:CodesignKey= \
            -p:CodesignProvision= \
            -p:InformationalVersion=${{ github.ref_name }} \
            -p:IncludeSourceRevisionInInformationalVersion=false

      - name: Package unsigned .ipa
        run: |
          set -euo pipefail
          SEARCH_ROOT="FEBuilderGBA.iOS/bin/${{ env.BUILD_CONFIGURATION }}/net9.0-ios/ios-arm64"
          ipa=$(find "$SEARCH_ROOT" -name '*.ipa' | head -n 1 || true)
          if [ -z "$ipa" ]; then
            app=$(find "$SEARCH_ROOT" -name '*.app' -type d | head -n 1)
            test -n "$app" || { echo "::error::no .app produced"; exit 1; }
            # Verify the bundled config/ tree survived (LogicalName not flattened).
            test -d "$app/config" || { echo "::error::bundled config/ tree missing"; exit 1; }
            rm -rf Payload; mkdir -p Payload; cp -R "$app" Payload/
            ditto -c -k --sequesterRsrc --keepParent Payload "$GITHUB_WORKSPACE/FEBuilderGBA-ios-unsigned.ipa"
            ipa="$GITHUB_WORKSPACE/FEBuilderGBA-ios-unsigned.ipa"
          fi
          zip -j "$GITHUB_WORKSPACE/FEBuilderGBA-ios-unsigned-ipa.zip" "$ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: FEBuilderGBA-ios-unsigned-ipa.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create the GitHub Release and attach every platform zip.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    # WinForms/CLI/Avalonia/Android are REQUIRED: #1629 AC1/AC2 mandate those platform
    # packages be built and attached, so a failure in any of them must block the release.
    # `ios` is in `needs` too (so the release waits for it) but is SOFT — its job is
    # continue-on-error and it is deliberately absent from the mandatory verify-assets
    # `require` list below (#1859), so a fragile macOS iOS build degrades to "release
    # without iOS" rather than blocking the whole release. Promote iOS to required once
    # its build is proven stable.
    needs: [ winforms, crossplatform, android, ios ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout with full history+tags so the changelog generator can read the
      # commit range between the previous ver_* tag and this one (#1632).
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List collected assets
        run: ls -la release-artifacts

      - name: Verify expected platform assets are present (AC1/AC2)
        # Fail BEFORE publishing if any required platform zip is missing, so the
        # release page can never list fewer than every platform download.
        run: |
          set -euo pipefail
          missing=0
          require() {
            if ! ls release-artifacts/$1 >/dev/null 2>&1; then
              echo "::error::Missing required release asset: $1"
              missing=1
            fi
          }
          require "FEBuilderGBA_${{ github.ref_name }}.zip"
          require "FEBuilderGBA-cli-linux-x64.zip"
          require "FEBuilderGBA-cli-osx-arm64.zip"
          require "FEBuilderGBA-cli-win-x64.zip"
          require "FEBuilderGBA-avalonia-linux-x64.zip"
          require "FEBuilderGBA-avalonia-osx-arm64.zip"
          require "FEBuilderGBA-avalonia-win-x64.zip"
          require "FEBuilderGBA-android-apk.zip"
          # NOTE: FEBuilderGBA-ios-unsigned-ipa.zip is intentionally NOT required (#1859) —
          # iOS is a soft/advisory preview asset, attached when its (continue-on-error) build
          # succeeds and simply absent otherwise. Do not add it here until iOS is promoted.
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required platform assets are missing; refusing to publish a partial release."
            exit 1
          fi
          echo "All required platform assets present."

      - name: Generate grouped release notes from conventional commits (#1632)
        # Build a type-grouped (feat/fix/docs/...) release body from the commit
        # subjects between the previous ver_* tag and this one. GitHub's native
        # generated notes (generate_release_notes below) group by PR LABEL and
        # cannot read the conventional prefix from a title, so this script
        # supplies the title-derived grouping. Output goes to the release body;
        # the native notes are appended after it.
        if: startsWith(github.ref, 'refs/tags/ver_')
        run: |
          set -euo pipefail
          chmod +x scripts/generate-changelog.sh
          {
            echo "## ${{ github.ref_name }}"
            echo
            scripts/generate-changelog.sh "" "${{ github.ref_name }}"
          } > release-notes.md
          # The full body goes to the release; only preview the head in the log
          # so a large tag range cannot bloat the Actions log / hit size limits.
          lines=$(wc -l < release-notes.md)
          echo "Generated release notes (${lines} lines; previewing first 60):"
          head -n 60 release-notes.md
          if [ "${lines}" -gt 60 ]; then echo "... (${lines} lines total; full body written to release-notes.md)"; fi

      - name: Create GitHub Release with all platform assets
        # Only create a release for a real ver_* tag push. On manual
        # workflow_dispatch (branch ref) this step is skipped, so dispatch is a
        # build-only dry run that never creates a release for a branch name.
        if: startsWith(github.ref, 'refs/tags/ver_')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Conventional-commit grouped notes (title-derived). When both
          # body_path and generate_release_notes are set, action-gh-release
          # appends GitHub's native auto-notes after this body.
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/**/*.zip
          token: ${{ github.token }}
