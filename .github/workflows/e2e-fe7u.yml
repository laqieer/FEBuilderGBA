name: "E2E: FE7U"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '33 21 * * *'  # Daily UTC 21:33 (Beijing 05:33)
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-run.yml
    with:
      rom-name: FE7U
      job-name: "E2E FE7U"
      timeout: 30
      caller-event: ${{ github.event_name }}
    secrets: inherit
