# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Debug

  BUILD_PLATFORM: x86

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Ensure x86 .NET 10 runtimes
      # The x86 testhost needs both the base and WindowsDesktop runtimes. Hosted
      # images normally include them, but install only whichever family is absent.
      shell: pwsh
      run: |
        $root = "C:\Program Files (x86)\dotnet"
        $dotnet = Join-Path $root "dotnet.exe"
        $runtimes = if (Test-Path $dotnet) { @(& $dotnet --list-runtimes) } else { @() }
        $needBase = -not ($runtimes -match '^Microsoft\.NETCore\.App 10\.')
        $needDesktop = -not ($runtimes -match '^Microsoft\.WindowsDesktop\.App 10\.')
        if ($needBase -or $needDesktop) {
          $installer = "$env:RUNNER_TEMP/dotnet-install.ps1"
          Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile $installer
          if ($needBase) {
            & $installer -Architecture x86 -Runtime dotnet -Channel 10.0 -InstallDir $root
          }
          if ($needDesktop) {
            & $installer -Architecture x86 -Runtime windowsdesktop -Channel 10.0 -InstallDir $root
          }
        }
        $runtimes = @(& $dotnet --list-runtimes)
        if (-not ($runtimes -match '^Microsoft\.NETCore\.App 10\.') -or
            -not ($runtimes -match '^Microsoft\.WindowsDesktop\.App 10\.')) {
          throw "Required x86 .NET 10 runtime families are unavailable."
        }
        $runtimes
        # setup-dotnet exposes the x64 root as DOTNET_ROOT. Persist the verified
        # x86 root so native x86 apphosts do not try to load the x64 hostfxr.
        "DOTNET_ROOT(x86)=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "DOTNET_ROOT_X86=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Extract PR body
      if: github.event_name == 'pull_request'
      shell: pwsh
      run: |
        $body = (Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json).pull_request.body
        if ($null -eq $body) { $body = '' }
        [System.IO.File]::WriteAllText("$env:RUNNER_TEMP/pr-body.txt", $body)

    - name: Run screenshot validator self-tests
      shell: bash
      run: bash scripts/validate-pr-screenshots.test.sh

    - name: Run changelog generator self-tests (#1632)
      shell: bash
      run: bash scripts/generate-changelog.test.sh

    - name: Run CLAUDE.md size-gate self-tests
      shell: bash
      run: bash scripts/check-claudemd-size.test.sh

    - name: Check CLAUDE.md under harness limit
      # CLAUDE.md is truncated by the Claude Code harness at ~40,000 chars; this
      # gate fails the build if it regrows past the limit (issue #1645 / #1039).
      shell: bash
      run: bash scripts/check-claudemd-size.sh

    - name: Validate PR screenshot URLs
      if: github.event_name == 'pull_request'
      shell: bash
      run: bash scripts/validate-pr-screenshots.sh "${{ github.event.pull_request.number }}" "$RUNNER_TEMP/pr-body.txt" "${{ github.event.repository.default_branch }}"

    - name: Validate Avalonia AutomationIds
      shell: pwsh
      run: ./scripts/validate-automation-ids.ps1

    - name: Init build-required submodules
      run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore resources/fe-info

    - name: Build ColorzCore (bundled EA tool)
      run: dotnet build tools/ColorzCore/ColorzCore/ColorzCore.csproj -c ${{env.BUILD_CONFIGURATION}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Use the .NET 10 SDK's MSBuild engine rather than Visual Studio's older SDK resolver.
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: dotnet msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} /t:build /restore ${{env.SOLUTION_FILE_PATH}}

    - name: Run Tests
      run: dotnet test --configuration ${{env.BUILD_CONFIGURATION}} --no-build --verbosity normal --logger "trx" --collect:"XPlat Code Coverage" --settings coverlet.runsettings

    - name: Publish Test Results
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: "**/TestResults/*.trx"
        reporter: dotnet-trx
        fail-on-error: true

    - name: Install ReportGenerator
      if: github.event_name == 'pull_request'
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      if: github.event_name == 'pull_request'
      run: reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"MarkdownSummaryGithub"

    - name: Comment PR with Coverage
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        path: coverage-report/SummaryGithub.md

  # Phase 7 of the gap-sweep methodology (#374). Runs every static-analysis
  # sweep on every PR / push and uploads the reports as workflow artifacts +
  # a job-summary preview. continue-on-error: true → does NOT block merge;
  # this is purely advisory while the baseline stabilises. Once the baseline
  # has been clean for ≥2 weekly refreshes the maintainer flips it to
  # blocking via a follow-up PR (per docs/avalonia-gaps/README.md).
  #
  # Independent of the Windows `build` job above — runs on ubuntu-latest
  # against the cross-platform FEBuilderGBA.Avalonia project (net10.0). No
  # ROM, no Windows-only dependency, no MSBuild — just `dotnet run` and
  # static analysis. ~1-2 minutes total based on local timings.
  gap-sweep-advisory:
    name: Gap-sweep (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore + build FEBuilderGBA.Avalonia
        run: dotnet build FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c Release

      - name: Run static-analysis sweeps
        shell: bash
        # GitHub Actions runs bash with `-e -o pipefail` by default — the
        # first failing `dotnet run` would abort this step before later
        # sweeps + the OUT export ran. Each sweep needs to be independently
        # non-fatal so the advisory job stays advisory (per Copilot PR #382
        # review). Strategy:
        #   1. Export OUT to $GITHUB_ENV BEFORE running any sweep so the
        #      summary + upload steps below can find the directory even if
        #      every sub-sweep returns non-zero.
        #   2. Run each sweep with `|| true` so the step itself never
        #      aborts; per-sweep exit codes show up in the workflow log.
        #   3. Use the new composite `--gap-sweep-all` flag, which has its
        #      own try/catch around each scanner and itself returns 0 as
        #      long as ≥1 sub-sweep succeeded. The composite writes the
        #      reports in the standard YYYY-MM-DD-<sweep>-sweep.md shape.
        run: |
          set +e
          OUT="${RUNNER_TEMP:-/tmp}/gap-sweep-$(date -u +%F)"
          mkdir -p "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          dotnet run --no-build --project FEBuilderGBA.Avalonia/FEBuilderGBA.Avalonia.csproj -c Release -- --gap-sweep-all --out="$OUT" || true
          # Normalise the date-prefixed composite output (YYYY-MM-DD-<sweep>-sweep.md)
          # into stable <sweep>.md names so the summary + artifact steps don't have
          # to chase the date. Idempotent: skips silently if the file isn't there
          # (e.g. a single sub-sweep failed).
          for sw in density labels jumps undo l10n; do
            f="$(ls "$OUT"/*-"$sw"-sweep.md 2>/dev/null | head -n 1)"
            if [ -n "$f" ]; then cp -f "$f" "$OUT/$sw.md"; fi
          done
          ls -la "$OUT"

      - name: Post job summary (top-50 lines per sweep)
        if: always()
        shell: bash
        # `set +e` so the for-loop keeps running across sweeps that
        # didn't produce output (e.g. one scanner threw); we always want
        # the GITHUB_STEP_SUMMARY to be a complete table, with "(no
        # report)" placeholders where appropriate.
        run: |
          set +e
          {
            echo "## Gap-sweep advisory"
            echo
            echo "Static-analysis reports for the Avalonia vs WinForms parity sweep (issue #374)."
            echo "These reports are uploaded as a workflow artifact below for full inspection."
            echo
            for sw in density labels jumps undo l10n; do
              echo "### $sw"
              echo
              if [ -f "${OUT:-}/$sw.md" ]; then
                echo '```markdown'
                head -50 "$OUT/$sw.md"
                echo '```'
              else
                echo "_(no report — sweep failed)_"
              fi
              echo
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sweep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gap-sweep-reports
          # Upload BOTH the date-prefixed composite outputs and the
          # normalised <sweep>.md aliases so the artifact is
          # self-documenting (date-prefixed = canonical baseline; flat
          # alias = easy ad-hoc browse on the PR's Files page).
          path: ${{ env.OUT }}/*.md
          if-no-files-found: warn
