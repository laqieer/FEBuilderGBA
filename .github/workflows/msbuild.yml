# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

  BUILD_PLATFORM: x86

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Init build-required submodules
      run: git submodule update --init config/patch2 tools/Event-Assembler tools/ColorzCore

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install x86 .NET 9 runtimes (windows-latest image dropped x86 9.0)
      # The GitHub-hosted windows-latest image now ships x86 Microsoft.NETCore.App
      # 8.0.x + 10.0.x but NOT 9.0.x, so the x86 testhost (testhost.x86.exe) for the
      # net9.0-windows WinForms test DLLs (FEBuilderGBA.Tests, FEBuilderGBA.E2ETests)
      # fails to launch with "You must install or update .NET". Install both the base
      # runtime (Microsoft.NETCore.App) and the WindowsDesktop runtime
      # (Microsoft.WindowsDesktop.App) for x86 into the canonical x86 dotnet root the
      # host already probes, so all versions coexist. See issue #1119.
      shell: pwsh
      run: |
        Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile "$env:RUNNER_TEMP/dotnet-install.ps1"
        & "$env:RUNNER_TEMP/dotnet-install.ps1" -Architecture x86 -Runtime dotnet         -Channel 9.0 -InstallDir "C:\Program Files (x86)\dotnet"
        & "$env:RUNNER_TEMP/dotnet-install.ps1" -Architecture x86 -Runtime windowsdesktop -Channel 9.0 -InstallDir "C:\Program Files (x86)\dotnet"

    - name: Publish ColorzCore (self-contained Windows x86)
      run: dotnet publish tools/ColorzCore/ColorzCore/ColorzCore.csproj -c ${{env.BUILD_CONFIGURATION}} -r win-x86 --self-contained true -o tools/publish

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} /t:build /restore ${{env.SOLUTION_FILE_PATH}}

    # ------------------------------------------------------------------------
    # Conditional Authenticode signing of the WinForms FEBuilderGBA.exe (#1634).
    #
    # Mirrors the conditional-signing pattern from #1654 (Android release
    # signing): the signing step activates ONLY when the maintainer adds a
    # code-signing certificate to GitHub Actions secrets. With the secrets ABSENT
    # — the state of this fork's CI — the unsigned exe is packaged exactly as
    # before, so no existing CI breaks. Documented in docs/RELEASE.md.
    #
    # `secrets.*` cannot be referenced in a step-level `if:` (GitHub Actions
    # forbids it), so presence is classified once into a step output
    # (winsign.outputs.present) and the signing step gates on that output. Both
    # WINDOWS_CERT_BASE64 and WINDOWS_CERT_PASSWORD must be set together: both
    # empty => unsigned fallback (the fork's current CI); both set => Authenticode
    # signing; a PARTIAL set fails fast so a half-configured maintainer gets a
    # clear error instead of a silent unsigned build.
    - name: Detect Windows signing secret
      id: winsign
      shell: pwsh
      env:
        WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      run: |
        # Read from env: (NOT inline ${{ secrets.* }}) to stay aligned with the
        # GitHub limitation and avoid embedding secret values in the script body.
        $set = 0
        $missing = @()
        foreach ($name in 'WINDOWS_CERT_BASE64','WINDOWS_CERT_PASSWORD') {
          $val = [Environment]::GetEnvironmentVariable($name)
          if (-not [string]::IsNullOrEmpty($val)) { $set++ } else { $missing += $name }
        }
        if ($set -eq 2) {
          "present=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Windows signing secrets detected — Authenticode-signing FEBuilderGBA.exe."
        } elseif ($set -eq 0) {
          "present=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "No Windows signing secrets — packaging the unsigned exe (unchanged)."
        } else {
          Write-Host "::error::Partial Windows signing secrets configured. Set BOTH WINDOWS_CERT_BASE64 and WINDOWS_CERT_PASSWORD (or neither). Missing: $($missing -join ', ')"
          exit 1
        }

    - name: Sign Windows WinForms exe (Authenticode)
      # Runs ONLY when both signing secrets are present. Imports the base64 PFX
      # into the CurrentUser cert store (password as a SecureString from env: —
      # never on a command line), signs FEBuilderGBA.exe by SHA-1 thumbprint with
      # signtool (located from the Windows SDK; hard error if not found), then
      # removes the cert from the store. SHA-256 file digest + RFC-3161 timestamp
      # so the signature stays valid after the cert expires.
      if: steps.winsign.outputs.present == 'true'
      shell: pwsh
      env:
        WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      run: |
        $ErrorActionPreference = 'Stop'
        $exe = "FEBuilderGBA/bin/Release/FEBuilderGBA.exe"
        if (-not (Test-Path $exe)) { Write-Host "::error::$exe not found — cannot sign."; exit 1 }

        # Locate signtool.exe from the installed Windows SDK(s). windows-latest
        # ships the SDK; pick the newest x64 signtool. Fail clearly if absent.
        $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match '\\x64\\' } |
          Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) {
          Write-Host "::error::signtool.exe not found under the Windows SDK. Cannot Authenticode-sign."
          exit 1
        }

        # Decode the PFX to a runner-temp file (auto-cleaned at job end).
        $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
        [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))

        # Import into CurrentUser\My, sign by thumbprint, then remove the cert —
        # so the PFX password is never passed to signtool as an argument.
        $sec = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec
        try {
          & $signtool.FullName sign /sha1 $cert.Thumbprint /fd sha256 /tr http://timestamp.digicert.com /td sha256 $exe
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::signtool failed (exit $LASTEXITCODE)."; exit 1 }
          & $signtool.FullName verify /pa $exe
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::signature verification failed."; exit 1 }
        } finally {
          Remove-Item -Path ("Cert:\CurrentUser\My\" + $cert.Thumbprint) -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $pfx -Force -ErrorAction SilentlyContinue
        }
        Write-Host "FEBuilderGBA.exe Authenticode-signed."

    - name: Run Tests
      run: dotnet test --configuration ${{env.BUILD_CONFIGURATION}} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --settings coverlet.runsettings

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"Html;MarkdownSummaryGithub;Cobertura"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ github.run_number }}
        path: "**/TestResults/*.trx"

    - name: Publish Test Results
      if: always()
      continue-on-error: true
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: "**/TestResults/*.trx"
        reporter: dotnet-trx
        fail-on-error: false

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ github.run_number }}
        path: coverage-report/

    - name: List Coverage Files
      if: always()
      shell: pwsh
      run: |
        Write-Host "Looking for coverage files..."
        Get-ChildItem -Path . -Filter "coverage.cobertura.xml" -Recurse | Select-Object FullName

    - name: Upload Coverage to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        verbose: true

    - name: Install JUnit Test Logger
      if: always()
      run: dotnet add FEBuilderGBA.Tests/FEBuilderGBA.Tests.csproj package JunitXml.TestLogger --version 3.1.21

    - name: Restore and Build Test Project
      if: always()
      run: dotnet build FEBuilderGBA.Tests/FEBuilderGBA.Tests.csproj --configuration ${{env.BUILD_CONFIGURATION}}

    - name: Re-run Tests with JUnit Logger
      if: always()
      run: dotnet test FEBuilderGBA.Tests/FEBuilderGBA.Tests.csproj --configuration ${{env.BUILD_CONFIGURATION}} --no-build --verbosity normal --logger "junit;LogFileName=test-results.xml"

    - name: Upload Test Results to Codecov
      if: always()
      continue-on-error: true
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        plugin: noop
        disable_search: true
        files: "**/test-results.xml"
        fail_ci_if_error: false
        verbose: true

    - name: Post Build
      run: |
        $build_time = Get-Date -UFormat '%Y%m%d.%H'
        echo "build_time=$build_time" >> "$env:GITHUB_ENV"
        mv FEBuilderGBA/bin/Release/FEBuilderGBA.exe .
        mv FEBuilderGBA/bin/Release/*.dll .
        mv FEBuilderGBA/bin/Release/*.json .
        # Move config directory (data, translate) — patch2 is git-managed, not bundled
        if (Test-Path "FEBuilderGBA/bin/Release/config") {
          if (Test-Path "config") {
            Remove-Item -Path "config" -Recurse -Force
          }
          mv FEBuilderGBA/bin/Release/config .
        }
        # Remove patch2 content from artifact — users update it via git
        # Keep the 5 empty version subdirs so the app doesn't crash on startup
        if (Test-Path "config/patch2") {
          Remove-Item "config/patch2" -Recurse -Force
        }
        $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE6"
        $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE7J"
        $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE7U"
        $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE8J"
        $null = New-Item -ItemType Directory -Force -Path "config/patch2/FE8U"
        # Copy self-contained ColorzCore to tools/bin/ for ToolPathResolver
        $colorzSrc = "tools/publish"
        if (Test-Path "$colorzSrc/ColorzCore.exe") {
          $null = New-Item -ItemType Directory -Force -Path "tools/bin"
          Copy-Item "$colorzSrc/*" "tools/bin/" -Recurse -Force
          Write-Host "Self-contained ColorzCore copied to tools/bin/"
        } else {
          Write-Host "##[error]ColorzCore publish output not found at tools/publish/"
          exit 1
        }
        # Copy lyn.exe if present
        $lynSrc = "tools/Event-Assembler/Event Assembler/Tools/lyn.exe"
        if (Test-Path $lynSrc) {
          $null = New-Item -ItemType Directory -Force -Path "tools/bin/Tools"
          Copy-Item $lynSrc "tools/bin/Tools/lyn.exe" -Force
          Write-Host "Bundled lyn.exe copied to tools/bin/Tools/"
        }
        echo "`n*Build $build_time from GitHub Action workflow [${{ github.workflow }} #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) & source code commit [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).*" >> README.md

    - name: Upload Core Artifact
      uses: actions/upload-artifact@v4.3.5
      with:
        name: ${{ github.event.repository.name }}_${{ env.build_time }}
        path: |
          *.exe
          *.dll
          *.json
          config/
          tools/bin/
          README*.md
          LICENSE
          THIRD-PARTY-NOTICES.md
